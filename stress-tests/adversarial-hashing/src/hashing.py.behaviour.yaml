module: hashing
language: python
import_path: stress-tests.adversarial-hashing.src.hashing

constants:
  - name: MISSING_SENTINEL
    type: str
    value: "missing00000"
    description: Sentinel for missing transitive deps in concrete-manifest. 12 chars, non-hex.

  - name: UNREADABLE_SENTINEL
    type: str
    value: "unreadabl000"
    description: Sentinel for unreadable transitive deps. 12 chars, non-hex.

functions:
  - name: compute_hash
    signature: "compute_hash(content: str) -> str"
    description: >
      SHA-256 hash of content, truncated to 12 hex chars.
      Content is stripped of leading/trailing whitespace before hashing.
    given_when_then:
      - given: any string content
        when: compute_hash is called
        then: returns exactly 12 lowercase hex characters
      - given: content with leading/trailing whitespace
        when: compute_hash is called
        then: produces the same hash as the stripped version
      - given: identical stripped content
        when: compute_hash is called twice
        then: returns the same hash both times (deterministic)
      - given: two different strings (after stripping)
        when: compute_hash is called on each
        then: returns different hashes (with high probability)
      - given: empty string
        when: compute_hash is called
        then: returns a valid 12-char hex string (hash of empty string)
    invariants:
      - output matches ^[0-9a-f]{12}$ for all inputs
      - whitespace-insensitive (strip before hash)
      - deterministic (same input always same output)
      - MUST NOT validate input encoding or emptiness
      - MUST NOT cache results across calls

  - name: parse_header
    signature: "parse_header(content: str) -> dict | None"
    description: >
      Parse @unslop-managed header from first 5 lines of a managed file.
      Strips comment prefixes (#, //, --, /*, <!--) and suffixes (*/, -->).
      Returns None if no @unslop-managed marker with 'Edit ... instead' is found.
    given_when_then:
      - given: content with @unslop-managed and "Edit path/to/spec instead" in first 5 lines
        when: parse_header is called
        then: returns dict with spec_path set to the extracted path
      - given: content without @unslop-managed in first 5 lines
        when: parse_header is called
        then: returns None
      - given: @unslop-managed on line 6 or later
        when: parse_header is called
        then: returns None (only first 5 lines scanned)
      - given: header with spec-hash, output-hash fields
        when: parse_header is called
        then: returns dict with spec_hash and output_hash extracted (12 hex chars each)
      - given: header with principles-hash field
        when: parse_header is called
        then: returns dict with principles_hash extracted
      - given: header with concrete-deps-hash field
        when: parse_header is called
        then: returns dict with concrete_deps_hash extracted
      - given: header with generated timestamp
        when: parse_header is called
        then: returns dict with generated field set
      - given: header with managed-end-line:N
        when: parse_header is called
        then: returns dict with managed_end_line set to integer N
      - given: header with concrete-manifest:path1:hash1,path2:hash2
        when: parse_header is called
        then: returns dict with concrete_manifest as {path1: hash1, path2: hash2}
      - given: manifest entry with sentinel hash (e.g. missing00000)
        when: parse_header is called
        then: sentinel hash is accepted in concrete_manifest
      - given: manifest entry with invalid hash (wrong length or chars)
        when: parse_header is called
        then: entry is silently skipped, not included in manifest
      - given: header wrapped in Python comment (# prefix)
        when: parse_header is called
        then: prefix is stripped before parsing
      - given: header wrapped in JS comment (// prefix)
        when: parse_header is called
        then: prefix is stripped before parsing
      - given: header wrapped in HTML comment (<!-- prefix, --> suffix)
        when: parse_header is called
        then: both prefix and suffix are stripped before parsing
      - given: header wrapped in C block comment (/* prefix, */ suffix)
        when: parse_header is called
        then: both prefix and suffix are stripped before parsing
      - given: header wrapped in SQL comment (-- prefix)
        when: parse_header is called
        then: prefix is stripped before parsing
      - given: legacy format "Generated from spec at <timestamp>"
        when: parse_header is called and no spec-hash present
        then: returns dict with old_format=True and generated set
      - given: @unslop-managed present but no "Edit ... instead" pattern
        when: parse_header is called
        then: returns None (spec_path extraction fails)
    invariants:
      - returns None or a dict with exactly 9 keys
      - dict keys are spec_path, spec_hash, output_hash, principles_hash, concrete_deps_hash, concrete_manifest, managed_end_line, generated, old_format
      - returns None (not empty dict) when marker is absent
      - only scans first 5 lines
      - prefix stripping is single-pass (first matching prefix wins)
      - MUST NOT support comment syntaxes beyond #, //, --, /*, <!--
      - no exceptions raised

  - name: get_body_below_header
    signature: "get_body_below_header(content: str, end_line: int | None = None) -> str"
    description: >
      Extract managed file content below the @unslop-managed header.
      Scans first 5 lines for header markers, skipping blank lines.
      Returns everything after the last header line.
      Optional end_line truncates body for protected regions.
    given_when_then:
      - given: content with 2-line header followed by code
        when: get_body_below_header is called with no end_line
        then: returns everything after the header
      - given: content with blank lines in header area
        when: get_body_below_header is called
        then: blank lines within first 5 lines are treated as header
      - given: content with no header markers
        when: get_body_below_header is called
        then: returns entire content (body_start stays at 0, first non-blank non-marker line breaks scan)
      - given: valid end_line (after header, >= 1)
        when: get_body_below_header is called
        then: returns lines from body_start to end_line-1 (1-indexed, exclusive)
      - given: end_line < 1
        when: get_body_below_header is called
        then: prints warning to stderr, returns full body
      - given: end_line at or before header end
        when: get_body_below_header is called
        then: prints warning to stderr, returns full body
      - given: end_line = None
        when: get_body_below_header is called
        then: returns full body below header (no truncation)
    invariants:
      - never raises exceptions
      - warns to stderr on invalid end_line (does not raise)
      - header markers are @unslop-managed, spec-hash:, output-hash:, Generated from spec at, concrete-manifest:
      - scanning window is first 5 lines only
      - MUST NOT handle binary content
