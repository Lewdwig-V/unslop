# Behaviour spec for retry module — extracted by Archaeologist
# This file is the Mason's ONLY input. The Mason cannot read source code.

behaviour: "retry_with_jitter"
interface: "src.retry:retry"

constraints:
  - given: "callable succeeds on first attempt"
    then: "return result immediately with no sleep"
  - given: "callable fails transiently then succeeds"
    then: "return result after successful retry"
  - given: "callable fails max_retries times"
    error: "MaxRetriesExceeded with attempts count and last_error"
  - invariant: "delay is always in [0, max_delay]"
  - invariant: "delay is always non-negative"
  - invariant: "no sleep occurs after the final attempt"
  - property: "delays include randomness (jitter) — not deterministic"
  - property: "with full jitter, some delays are below base_delay"
  - given: "max_retries < 1"
    error: "ValueError: max_retries must be >= 1"
  - given: "base_delay <= 0"
    error: "ValueError: base_delay must be > 0"
  - given: "max_delay < base_delay"
    error: "ValueError: max_delay must be >= base_delay"
  - property: "RetryConfig is immutable after creation"

errors:
  - "MaxRetriesExceeded: raised after exhausting all retry attempts, carries attempts count and last_error"
  - "ValueError: raised on invalid RetryConfig parameters"

invariants:
  - "Total sleep time across all retries is bounded by max_retries * max_delay"
  - "Each individual delay is bounded by [0, min(max_delay, base_delay * 2^attempt)]"

depends_on: []
