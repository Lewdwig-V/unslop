behaviour: "retry_with_backoff"
interface: "src.retry_v1:retry"
constraints:
  - given: "fn succeeds on first call"
    then: "returns fn() result immediately, no sleep"
  - given: "fn raises Exception on first call, succeeds on second"
    then: "returns fn() result after one retry"
  - given: "fn raises Exception on all attempts"
    then: "raises RetryError after max_retries attempts"
  - given: "max_retries = 1"
    then: "calls fn exactly once, no retries, no sleep"
  - given: "max_retries = 0"
    then: "raises RetryError immediately with last_exception=None, attempts=0"
  - given: "fn returns object with status_code >= 500"
    then: "treats as retryable error, retries up to max_retries"
  - given: "fn returns object with status_code in 400..499"
    then: "does NOT retry, returns response or raises immediately"
  - given: "fn raises KeyboardInterrupt"
    then: "propagates immediately, does not catch or retry"
  - given: "fn raises SystemExit"
    then: "propagates immediately, does not catch or retry"
  - invariant: "delay between retries never exceeds max_delay"
  - invariant: "delay = base_delay * 2^attempt (before jitter)"
  - invariant: "jitter randomizes delay within [0.5 * computed_delay, computed_delay] when enabled (half-jitter)"
  - invariant: "sleep and RNG are injectable for testing"
  - property: "each call to retry() is independent -- no shared state"
errors:
  - "RetryError: raised when all retry attempts are exhausted. Wraps last_exception."
invariants:
  - "RetryError.last_exception preserves the original exception"
  - "RetryError.attempts equals max_retries"
  - "delay is computed only between attempts, never before first call or after last failure"
depends_on:
  - "random (stdlib)"
  - "time (stdlib)"

behaviour: "retry_with_timeout"
interface: "src.retry_v1:retry_with_timeout"
constraints:
  - given: "fn succeeds within timeout"
    then: "returns fn() result"
  - given: "total elapsed time exceeds timeout before next fn() call"
    then: "raises TimeoutError"
  - given: "fn fails but retries would succeed within timeout"
    then: "retries normally via retry()"
  - invariant: "timeout is measured from initial call, not per-attempt"
  - invariant: "all retry() kwargs are forwarded"
errors:
  - "TimeoutError: raised when elapsed time exceeds timeout before next attempt"
depends_on:
  - "src.retry_v1:retry"
